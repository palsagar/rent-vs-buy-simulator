name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

jobs:
  pypi-publish:
    name: Build and upload to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Verify tag matches package version
        env:
          TAG: ${{ inputs.tag || github.event.release.tag_name }}
        run: |
          PACKAGE_VERSION=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG" != "v$PACKAGE_VERSION" ]; then
            echo "::error::Release tag $TAG does not match package version v$PACKAGE_VERSION"
            exit 1
          fi

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish
